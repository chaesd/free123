name: Auto Fetch Nodes

on:
  schedule:
    # 每天北京时间早上 8 点自动运行抓取 (UTC时间0点)
    - cron: '0 17 * * *'
  workflow_dispatch: # 允许在网页上手动点击运行

# 必须增加写入权限，否则无法把生成的 sub.txt 保存回仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run script
      run: python main.py
        
    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sub.txt
        # 如果节点没变化就不提交，防止报错中断
        git commit -m "Auto update nodes" || exit 0
        git push
